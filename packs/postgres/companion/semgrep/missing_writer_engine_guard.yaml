rules:
  - id: missing-writer-engine-guard
    message: >
      writer_engine.$METHOD() called without "if not writer_engine:" null-guard
      in $F. Add the guard at function entry to prevent AttributeError when
      DB_PASS_WRITER is unset.
    severity: WARNING
    languages: [python]
    # Matches functions that call writer_engine.begin()/.connect() (including
    # inside "with" statements) without a preceding "if not writer_engine:"
    # null-guard at function entry. Negation requires two pattern-not clauses
    # because the call appears in two surface forms.
    patterns:
      - pattern-either:
          - pattern: |
              def $F(...):
                ...
                writer_engine.$METHOD(...)
                ...
          - pattern: |
              def $F(...):
                ...
                with writer_engine.$METHOD(...) as $V:
                  ...
                ...
      - pattern-not: |
          def $F(...):
            ...
            if not writer_engine:
              ...
            ...
            writer_engine.$METHOD(...)
            ...
      - pattern-not: |
          def $F(...):
            ...
            if not writer_engine:
              ...
            ...
            with writer_engine.$METHOD(...) as $V:
              ...
            ...
    # paths: intentionally omitted. Path scoping is declared in the pack's
    # checks.yml.fragment stub entry (see core/companion/semgrep/README.md).
