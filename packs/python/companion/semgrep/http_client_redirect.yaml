rules:
  - id: http-client-redirect
    message: >
      httpx.Client(...) / httpx.AsyncClient(...) constructor missing
      follow_redirects=. Library defaults can change and open redirects can
      leak Authorization headers to attacker-controlled servers. Set
      follow_redirects=False at client level — per-request overrides are
      fragile and may be omitted on future code paths.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: httpx.Client(...)
          - pattern: httpx.AsyncClient(...)
      - pattern-not: httpx.Client(..., follow_redirects=..., ...)
      - pattern-not: httpx.AsyncClient(..., follow_redirects=..., ...)
